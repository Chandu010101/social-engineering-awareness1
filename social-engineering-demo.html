<!DOCTYPE html>
<html>
<head>
    <title>Security Awareness Training Demo</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 450px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        .output-box {
            margin-top: 20px;
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔐 Social Engineering Awareness Demo</h2>
    <p>This is a training simulation. Do NOT enter real banking details.</p>

    <form onsubmit="captureData(event)">
        <input type="text" id="name" placeholder="Full Name (Demo Only)" required><br>
        <input type="date" id="dob" required><br>
        <input type="text" id="account" placeholder="Account Number (Demo Only)" required><br>
        <input type="text" id="ifsc" placeholder="IFSC Code (Demo Only)" required><br>
        <button type="submit">Submit</button>
    </form>

    <div id="result" class="output-box"></div>
</div>

<script>
function captureData(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let dob = document.getElementById("dob").value;
    let account = document.getElementById("account").value;
    let ifsc = document.getElementById("ifsc").value;

    let resultBox = document.getElementById("result");
    resultBox.style.display = "block";

    resultBox.innerHTML =
        "<b>Captured Form Data (Demo Only):</b><br>" +
        "Name: " + name + "<br>" +
        "Date of Birth: " + dob + "<br>" +
        "Account Number: " + account + "<br>" +
        "IFSC Code: " + ifsc + "<br><br>" +
        "⚠️ This demonstrates how attackers can capture your information.";
}
</script>

</body>
</html>
